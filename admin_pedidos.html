const ghCfg   = () => JSON.parse(localStorage.getItem(GH_KEY) || '{}');
const ghReady = () => { const c = ghCfg(); return !!(c.token && c.owner && c.repo); };

async function ghApi(path, method = 'GET', body = null) {
  const c = ghCfg();
  const res = await fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/contents/${path}`, {
    method,
    headers: {
      Authorization: `Bearer ${c.token}`,
      Accept: 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
    },
    body: body ? JSON.stringify(body) : null,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || `HTTP ${res.status}`);
  return data;
}

async function ghSha(path) {
  try { return (await ghApi(path)).sha; } catch { return null; }
}

// Sube un archivo de texto (JSON, etc.)
async function ghPutText(path, text, msg) {
  const sha = await ghSha(path);
  const content = btoa(unescape(encodeURIComponent(text)));
  const body = { message: msg, content, branch: ghCfg().branch || 'main' };
  if (sha) body.sha = sha;
  return ghApi(path, 'PUT', body);
}

// Sube una imagen en base64 (DataURL → strip prefix)
async function ghPutImage(path, dataUrl, msg) {
  const content = dataUrl.includes(',') ? dataUrl.split(',')[1] : dataUrl;
  const sha = await ghSha(path);
  const body = { message: msg, content, branch: ghCfg().branch || 'main' };
  if (sha) body.sha = sha;
  return ghApi(path, 'PUT', body);
}

/* Garantiza que cada pedido tiene un id único y campos normalizados */
function normalizeOrder(o, idx) {
  return {
    ...o,
    id:      o.id   || o.num || `ORD-${idx}-${Date.now()}`,
    estado:  o.estado || o.status   || 'Pendiente',
    cliente: o.cliente || o.name    || '—',
    fecha:   o.fecha   || (o.ts ? o.ts.slice(0,10) : ''),
    local:   o.local   || o.loc     || '',
    entrega: o.entrega || o.delivery|| '',
    precio:  o.precio  !== undefined ? o.precio : (o.total || 0),
    cantidad: o.cantidad || 1,
  };
}
function loadOrders() {
  try {
    const raw = localStorage.getItem(ORDERS_KEY);
    const list = raw ? JSON.parse(raw) : SAMPLE_ORDERS;
    return list.map(normalizeOrder);
  } catch { return SAMPLE_ORDERS.map(normalizeOrder); }
}
function saveOrders(list) { localStorage.setItem(ORDERS_KEY, JSON.stringify(list)); }

function loadProducts() {
  try {
    const raw = localStorage.getItem(PRODUCTS_KEY);
    return raw ? JSON.parse(raw) : SEED_PRODUCTS;
  } catch { return SEED_PRODUCTS; }
}
function saveProducts(list) { localStorage.setItem(PRODUCTS_KEY, JSON.stringify(list)); }

function fmt(n) {
  return new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR'}).format(n);
}

  const h = ['ID','Cliente','Teléfono','Email','Productos','Total €','Estado','Fecha','Local','Entrega'];
  const rows = orders.map(o=>{
    const id       = o.id||o.num||'';
    const cliente  = o.cliente||o.name||'';
    const tel      = o.telefono||'';
    const mail     = o.email||'';
    const producto = Array.isArray(o.items)&&o.items.length
      ? o.items.map(it=>`${it.name} (${it.sub_label})`).join(' | ')
      : (o.producto||'');
    const total    = (Number(o.precio||o.total||0)*Number(o.cantidad||1)).toFixed(2);
    const estado   = o.estado||o.status||'';
    const fecha    = o.fecha||(o.ts?o.ts.slice(0,10):'');
    const local    = o.local||o.loc||'';
    const entrega  = o.entrega||o.delivery||'';
    return [id,cliente,tel,mail,producto,total,estado,fecha,local,entrega].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  const csv = [h.join(','),...rows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download = `pedidos_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

const ORDER_COUNTER_KEY = 'aec_order_counter';
function generateOrderId() {
  const year = new Date().getFullYear();
  const stored = JSON.parse(localStorage.getItem(ORDER_COUNTER_KEY) || '{"year":0,"count":0}');
  const count = stored.year === year ? stored.count + 1 : 1;
  localStorage.setItem(ORDER_COUNTER_KEY, JSON.stringify({year, count}));
  return `${year}/${String(count).padStart(5,'0')}`;
}

function OrderModal({onSave, onClose}) {
  const [products] = useState(()=>loadProducts().filter(p=>p.active!==false));
  const today = new Date().toISOString().slice(0,10);
  const [form, setForm] = useState({
    id: '',
    cliente:'', telefono:'', email:'',
    local:'', entrega:'recogida',
    estado:'Pendiente', fecha:today,
    items:[], notas:'',
  });
  const [selProd, setSelProd] = useState('');
  const [selQty,  setSelQty]  = useState(1);
  const [selTag,  setSelTag]  = useState('');

  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const total = form.items.reduce((s,it)=>s+Number(it.price||0), 0);

  const addItem = () => {
    const prod = products.find(p=>String(p.id)===String(selProd));
    if (!prod) return;
    const label = selTag.trim() || `${selQty} ${prod.unit||'ud'}`;
    setForm(f=>({...f, items:[...f.items, {
      name: prod.name,
      sub_label: label,
      price: Number((prod.price * selQty).toFixed(2)),
    }]}));
    setSelProd(''); setSelQty(1); setSelTag('');

  const removeItem = idx => setForm(f=>({...f, items:f.items.filter((_,i)=>i!==idx)}));

    if (!form.cliente.trim()) return;
    const id = generateOrderId();
    const producto = form.items.length ? form.items.map(it=>it.name).join(', ') : '—';
    onSave({...form, id, producto, precio:Number(total.toFixed(2)), cantidad:1});

function TabPedidos({showToast}) {
  const [orders,      setOrders]      = useState(loadOrders);
  const [search,      setSearch]      = useState('');
  const [filter,      setFilter]      = useState('Todos');
  const [sort,        setSort]        = useState({col:'fecha',dir:'desc'});
  const [selIds,      setSelIds]      = useState(new Set());
  const [bulkSt,      setBulkSt]      = useState('');
  const [refreshing,  setRefreshing]  = useState(false);
  const [confirmDel,  setConfirmDel]  = useState(false); // modal verificación borrado
  const [confirmReset,setConfirmReset]= useState(false); // modal reinicio contador
  const [orderModal,  setOrderModal]  = useState(false); // modal pedido manual

  useEffect(()=>{ saveOrders(orders); },[orders]);

  const refresh = () => {
    setRefreshing(true);
    setTimeout(()=>{
      setOrders(loadOrders());
      setRefreshing(false);
      showToast('Pedidos actualizados','info');
    }, 400);
  };

  const filtered = useMemo(()=>{
    let l = filter==='Todos' ? orders : orders.filter(o=>o.estado===filter);
    if (search.trim()) {
      const q = search.toLowerCase();
      l = l.filter(o=>[o.id,o.cliente,o.producto,o.local||''].some(v=>String(v).toLowerCase().includes(q)));
    }
    return [...l].sort((a,b)=>{
      let va=a[sort.col], vb=b[sort.col];
      if(['precio','cantidad'].includes(sort.col)){va=+va;vb=+vb;}
      return sort.dir==='asc'?(va<vb?-1:va>vb?1:0):(va<vb?1:va>vb?-1:0);
    });
  },[orders,filter,search,sort]);

  const stats = useMemo(()=>({
    total: orders.length,
    pendiente: orders.filter(o=>o.estado==='Pendiente').length,
    enproceso: orders.filter(o=>o.estado==='En proceso').length,
    revenue:   orders.filter(o=>o.estado!=='Cancelado').reduce((s,o)=>s+Number(o.precio||o.total||0)*Number(o.cantidad||1),0),
  }),[orders]);

  const tSort = col => setSort(s=>s.col===col?{col,dir:s.dir==='asc'?'desc':'asc'}:{col,dir:'asc'});

  const updateStatus = (id, estado) => {
    setOrders(p=>p.map(o=>o.id===id?{...o,estado}:o));
    showToast(`${id} → ${estado}`,'ok');
  };
  const toggleSel = id => setSelIds(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});
  const toggleAll = () => selIds.size===filtered.length?setSelIds(new Set()):setSelIds(new Set(filtered.map(o=>o.id)));
  const applyBulk = () => {
    if(!bulkSt||!selIds.size) return;
    setOrders(p=>p.map(o=>selIds.has(o.id)?{...o,estado:bulkSt}:o));
    showToast(`${selIds.size} pedidos → ${bulkSt}`,'ok');
    setSelIds(new Set()); setBulkSt('');
  };
  const deleteSelected = () => {
    const n = selIds.size;
    setOrders(p=>p.filter(o=>!selIds.has(o.id)));
    setSelIds(new Set());
    setConfirmDel(false);
    showToast(`${n} pedido${n!==1?'s':''} eliminado${n!==1?'s':''}`, 'info');
  };

  const resetCounter = () => {
    localStorage.setItem(ORDER_COUNTER_KEY, JSON.stringify({year:0, count:0}));
    setConfirmReset(false);
    showToast('Contador de IDs reiniciado — el próximo pedido será 2026/00001', 'ok');
  };

  const handleCreateOrder = (order) => {
    setOrders(p=>[order, ...p]);
    showToast(`Pedido ${order.id} creado`, 'ok');
    setOrderModal(false);
  };

  const TH = ({col,label,cls=''}) => (
    <th onClick={()=>tSort(col)} className={`px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-white/40 cursor-pointer select-none hover:text-white/70 ${cls}`}>
      <span className="inline-flex items-center gap-1">{label}
        {sort.col===col?<span className="text-brand">{sort.dir==='asc'?'↑':'↓'}</span>:<span className="opacity-20">↕</span>}
      </span>
    </th>
  );

  return (
    <div className="space-y-5">
      {/* Stats */}
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
        {[['Total pedidos',stats.total,'text-white'],['Pendientes',stats.pendiente,'text-yellow-300'],['En proceso',stats.enproceso,'text-blue-300'],['Facturación',fmt(stats.revenue),'text-brand']].map(([l,v,c])=>(
          <div key={l} className="bg-dark-3 border border-white/5 rounded-xl p-4">
            <div className="text-xs text-white/40 uppercase tracking-wider mb-1">{l}</div>
            <div className={`text-2xl font-bold ${c}`}>{v}</div>
          </div>
        ))}
      </div>

      {/* Filtros */}
      <div className="flex flex-col sm:flex-row gap-3">
        <div className="relative flex-1">
          <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-white/30" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path strokeLinecap="round" d="m21 21-4.35-4.35"/></svg>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por ID, cliente, producto…"
            className="w-full bg-dark-3 border border-white/10 rounded-xl pl-9 pr-8 py-2.5 text-sm text-white placeholder-white/25 focus:outline-none focus:border-brand/50"/>
          {search && <button onClick={()=>setSearch('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60">✕</button>}
        </div>
        <div className="flex gap-2 flex-wrap">
          {['Todos',...ESTADOS_ORDER].map(e=>(
            <button key={e} onClick={()=>setFilter(e)}
              className={`px-3 py-2 rounded-xl text-xs font-medium transition-all border ${filter===e?'bg-brand text-dark border-brand':'bg-dark-3 text-white/50 border-white/10 hover:border-white/20 hover:text-white/70'}`}>{e}</button>
          ))}
        </div>
      </div>

      {/* Bulk */}
      {selIds.size>0 && (
        <div className="flex items-center gap-3 bg-brand/10 border border-brand/30 rounded-xl px-4 py-3 flex-wrap">
          <span className="text-sm text-brand font-medium">{selIds.size} seleccionado{selIds.size!==1?'s':''}</span>
          <div className="flex gap-2 ml-auto flex-wrap items-center">
            <select value={bulkSt} onChange={e=>setBulkSt(e.target.value)} className="bg-dark-3 border border-white/15 text-white text-xs rounded-lg px-2 py-1.5 focus:outline-none">
              <option value="">Cambiar estado…</option>
              {ESTADOS_ORDER.map(s=><option key={s}>{s}</option>)}
            </select>
            <button onClick={applyBulk} disabled={!bulkSt} className="bg-brand disabled:opacity-40 hover:bg-brand-light text-dark text-xs font-semibold px-3 py-1.5 rounded-lg">Aplicar</button>
            {/* Separador */}
            <span className="text-white/15 text-sm select-none">|</span>
            {/* Botón eliminar */}
            <button onClick={()=>setConfirmDel(true)}
              className="flex items-center gap-1.5 text-red-400 hover:text-red-300 border border-red-400/30 hover:border-red-400/60 text-xs font-semibold px-3 py-1.5 rounded-lg transition-all">
              <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
              Eliminar
            </button>
            <button onClick={()=>setSelIds(new Set())} className="text-white/40 hover:text-white/60 text-xs px-2">Cancelar</button>
          </div>
        </div>
      )}

      {/* Modal confirmación borrado */}
      {confirmDel && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-dark/80 backdrop-blur-sm">
          <div className="bg-dark-3 border border-red-400/20 rounded-2xl p-6 w-full max-w-sm text-center shadow-2xl">
            <div className="w-12 h-12 rounded-full bg-red-400/15 flex items-center justify-center mx-auto mb-4">
              <svg className="w-6 h-6 text-red-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </div>
            <h3 className="font-bold text-white text-lg mb-2">¿Eliminar pedidos?</h3>
            <p className="text-sm text-white/50 mb-1">
              Vas a eliminar <span className="text-red-300 font-semibold">{selIds.size} pedido{selIds.size!==1?'s':''}</span>.
            </p>
            <p className="text-xs text-white/30 mb-6">Esta acción es permanente y no se puede deshacer.</p>
            <div className="flex gap-3">
              <button onClick={()=>setConfirmDel(false)}
                className="flex-1 py-2.5 rounded-xl border border-white/15 text-white/60 hover:text-white/80 text-sm transition-colors">
                Cancelar
              </button>
              <button onClick={deleteSelected}
                className="flex-1 py-2.5 rounded-xl bg-red-500 hover:bg-red-400 text-white font-semibold text-sm transition-colors">
                Sí, eliminar
              </button>
            </div>
          </div>
        </div>
      )}

      {confirmReset && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-dark/80 backdrop-blur-sm">
          <div className="bg-dark-3 border border-yellow-400/20 rounded-2xl p-6 w-full max-w-sm text-center shadow-2xl">
            <div className="w-12 h-12 rounded-full bg-yellow-400/15 flex items-center justify-center mx-auto mb-4">
              <svg className="w-6 h-6 text-yellow-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
              </svg>
            </div>
            <h3 className="font-bold text-white text-lg mb-2">¿Reiniciar contador de IDs?</h3>
            <p className="text-sm text-white/50 mb-1">El próximo pedido que crees tendrá el ID <span className="text-yellow-300 font-semibold font-mono">{new Date().getFullYear()}/00001</span>.</p>
            <p className="text-xs text-white/30 mb-6">Los pedidos existentes no se modifican. Esta acción no se puede deshacer.</p>
            <div className="flex gap-3">
              <button onClick={()=>setConfirmReset(false)}
                className="flex-1 py-2.5 rounded-xl border border-white/15 text-white/60 hover:text-white/80 text-sm transition-colors">
                Cancelar
              </button>
              <button onClick={resetCounter}
                className="flex-1 py-2.5 rounded-xl bg-yellow-500 hover:bg-yellow-400 text-dark font-semibold text-sm transition-colors">
                Sí, reiniciar
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Tabla */}
      <div className="bg-dark-2 border border-white/5 rounded-2xl overflow-hidden">
        <div className="px-4 py-3 border-b border-white/5 flex items-center justify-between">
          <span className="text-xs text-white/40">{filtered.length} pedido{filtered.length!==1?'s':''}</span>
          <div className="flex items-center gap-2">
            <button onClick={refresh} title="Recargar pedidos"
              className={`flex items-center gap-1.5 border border-white/15 hover:border-white/30 text-white/60 hover:text-white text-xs px-3 py-1.5 rounded-lg transition-all ${refreshing?'opacity-50 pointer-events-none':''}`}>
              <svg className={`w-3.5 h-3.5 ${refreshing?'animate-spin':''}`} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
              </svg>
              {refreshing?'Actualizando…':'Actualizar'}
            </button>
            <button onClick={()=>setOrderModal(true)}
              className="flex items-center gap-1 border border-brand/40 hover:border-brand/70 text-brand text-xs font-semibold px-3 py-1.5 rounded-lg transition-colors whitespace-nowrap">
              <span className="text-base leading-none">+</span> Nuevo pedido
            </button>
            <button onClick={()=>setConfirmReset(true)} title="Reiniciar contador de IDs"
              className="flex items-center gap-1.5 border border-white/10 hover:border-white/25 text-white/40 hover:text-white/70 text-xs px-3 py-1.5 rounded-lg transition-colors whitespace-nowrap">
              <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
              Reiniciar IDs
            </button>
            <button onClick={()=>exportCSV(filtered)} className="flex items-center gap-1.5 bg-brand hover:bg-brand-light text-dark font-semibold text-xs px-3 py-1.5 rounded-lg transition-colors">
              <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
              Exportar CSV
            </button>
          </div>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full min-w-[650px]">
            <thead className="bg-dark-3 border-b border-white/5">
              <tr>
                <th className="px-4 py-3 w-10"><input type="checkbox" checked={selIds.size===filtered.length&&filtered.length>0} onChange={toggleAll} className="w-4 h-4 accent-brand rounded cursor-pointer"/></th>
                <TH col="id" label="ID"/>
                <TH col="cliente" label="Cliente"/>
                <TH col="producto" label="Producto" cls="hidden md:table-cell"/>
                <TH col="precio" label="Precio"/>
                <TH col="estado" label="Estado"/>
                <TH col="fecha" label="Fecha" cls="hidden lg:table-cell"/>
                <th className="px-4 py-3 text-xs font-semibold text-white/40 text-right">Cambiar</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-white/5">
              {filtered.length===0
                ? <tr><td colSpan="8" className="px-4 py-16 text-center text-white/30 text-sm">No se encontraron pedidos</td></tr>
                : filtered.map(o=>(
                  <tr key={o.id} className={`transition-colors hover:bg-white/[0.02] ${selIds.has(o.id)?'bg-brand/5':''}`}>
                    <td className="px-4 py-3"><input type="checkbox" checked={selIds.has(o.id)} onChange={()=>toggleSel(o.id)} className="w-4 h-4 accent-brand rounded cursor-pointer"/></td>
                    <td className="px-4 py-3"><span className="text-xs font-mono text-brand/80">{o.id}</span></td>
                    <td className="px-4 py-3">
                      <div className="font-medium text-sm text-white">{o.cliente || o.name || '—'}</div>
                      <div className="text-xs text-white/35">
                        {o.local||o.loc||''}{(o.entrega||o.delivery)?' · '+(o.entrega||o.delivery):''}
                      </div>
                      {(o.telefono||o.email) && (
                        <div className="text-xs text-white/25 mt-0.5">
                          {o.telefono}{o.telefono&&o.email?' · ':''}{o.email}
                        </div>
                      )}
                    </td>
                    <td className="px-4 py-3 hidden md:table-cell">
                      {/* Si hay items detallados los mostramos línea a línea, si no el string resumen */}
                      {Array.isArray(o.items) && o.items.length > 0
                        ? <div className="space-y-0.5">
                            {o.items.map((it,i)=>(
                              <div key={i} className="text-xs text-white/70">{it.name} <span className="text-white/35">({it.sub_label})</span></div>
                            ))}
                          </div>
                        : <span className="text-sm text-white/70">{o.producto||o.items||'—'}</span>
                      }
                    </td>
                    <td className="px-4 py-3">
                      <span className="text-sm font-semibold text-white">
                        {/* total = precio*cantidad (pedidos nuevos: cantidad=1, precio=total) */}
                        {fmt(Number(o.precio||o.total||0) * Number(o.cantidad||1))}
                      </span>
                    </td>
                    <td className="px-4 py-3"><Badge estado={o.estado}/></td>
                    <td className="px-4 py-3 hidden lg:table-cell"><span className="text-xs text-white/40">{o.fecha}</span></td>
                    <td className="px-4 py-3 text-right">
                      <select value={o.estado} onChange={e=>updateStatus(o.id,e.target.value)}
                        className="bg-dark-2 border border-white/10 text-white text-xs rounded-lg px-2 py-1.5 focus:outline-none focus:border-brand/60">
                        {ESTADOS_ORDER.map(s=><option key={s}>{s}</option>)}
                      </select>
                    </td>
                  </tr>
                ))
              }
            </tbody>
          </table>
        </div>
        {filtered.length>0 && (
          <div className="px-4 py-3 border-t border-white/5 flex justify-between text-xs text-white/30">
            <span>Total visible: <span className="text-brand font-semibold">{fmt(filtered.reduce((s,o)=>s+Number(o.precio||o.total||0)*Number(o.cantidad||1),0))}</span></span>
            <span>{filtered.length} de {orders.length}</span>
          </div>
        )}
      </div>

      {/* Modal pedido manual */}
      {orderModal && <OrderModal onSave={handleCreateOrder} onClose={()=>setOrderModal(false)}/>}
    </div>
  );
}

/* ════════════════════════════════════════════════
   MODAL PRODUCTO (crear / editar)
   ════════════════════════════════════════════════ */
function parseImgPos(pos='center center'){
  const M={left:0,center:50,right:100,top:0,bottom:100};
  const [px='center',py='center'] = (pos||'center center').trim().split(/\s+/);
  const x = M[px]!==undefined ? M[px] : (parseFloat(px)||50);
  const y = M[py]!==undefined ? M[py] : (parseFloat(py)||50);
  return {x,y};
}

function ProductModal({product, onSave, onClose}) {
  const isNew = !product;
  const imgRef = useRef(null);
  const previewRef = useRef(null);
  const dragRef = useRef(null);
  const blank = {id:Date.now(),cat:'arroces',name:'',price:'',unit:'ud',minR:'',desc:'',al:[],top:false,active:true,img:'',imgUrl:'',imgData:'',imgPos:'50% 50%',imgZoom:1};
  const [form, setForm] = useState(product ? {...product, price:String(product.price), minR:String(product.minR||''), imgUrl:product.imgUrl||'', imgData:product.imgData||'', imgPos:product.imgPos||'50% 50%', imgZoom:product.imgZoom||1} : blank);
  const [dragging, setDragging] = useState(false);

  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const toggleAl = al => setForm(f=>({...f,al:f.al.includes(al)?f.al.filter(x=>x!==al):[...f.al,al]}));
  const clampZoom = z => Math.round(Math.max(1, Math.min(3, z)) * 10) / 10;

  const startDrag = (clientX, clientY) => {
    const {x,y} = parseImgPos(form.imgPos);
    dragRef.current = {sx:clientX, sy:clientY, px:x, py:y, zoom:form.imgZoom||1};
    setDragging(true);
    const onMove = (e) => {
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      const rect = previewRef.current?.getBoundingClientRect();
      if (!rect || !dragRef.current) return;
      const dx = cx - dragRef.current.sx;
      const dy = cy - dragRef.current.sy;
      const z = dragRef.current.zoom;
      const nx = Math.round(Math.max(0,Math.min(100, dragRef.current.px - dx/rect.width*100/z)));
      const ny = Math.round(Math.max(0,Math.min(100, dragRef.current.py - dy/rect.height*100/z)));
      setForm(f=>({...f, imgPos:`${nx}% ${ny}%`}));
    };
    const onUp = () => {
      setDragging(false);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchmove', onMove, {passive:true});
    document.addEventListener('touchend', onUp);
  };

  const submit = () => {
    if (!form.name.trim()) return;
    const price = parseFloat(form.price);
    if (isNaN(price)||price<0) return;
    onSave({...form, price, minR: form.minR?parseInt(form.minR):null, id: form.id||Date.now()});
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-dark/80 backdrop-blur-sm" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="bg-dark-3 border border-white/10 rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto shadow-2xl">
        <div className="flex items-center justify-between px-6 py-4 border-b border-white/10">
          <h2 className="font-bold text-white">{isNew?'Añadir producto':'Editar producto'}</h2>
          <button onClick={onClose} className="text-white/40 hover:text-white/80 text-xl leading-none">✕</button>
        </div>
        <div className="px-6 py-5 space-y-4">

          {/* Nombre */}
          <div>
            <label className="block text-xs text-white/40 uppercase tracking-wider mb-1.5">Nombre *</label>
            <input value={form.name} onChange={e=>set('name',e.target.value)} placeholder="Nombre del producto"
              className="w-full bg-dark-2 border border-white/15 rounded-xl px-3 py-2.5 text-white text-sm focus:outline-none focus:border-brand/60"/>
          </div>

          {/* Categoría + Precio */}
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="block text-xs text-white/40 uppercase tracking-wider mb-1.5">Categoría *</label>
              <select value={form.cat} onChange={e=>set('cat',e.target.value)} className="w-full bg-dark-2 border border-white/15 rounded-xl px-3 py-2.5 text-white text-sm focus:outline-none focus:border-brand/60">
                {CATS.map(c=><option key={c} value={c}>{CAT_LABELS[c]}</option>)}
              </select>
            </div>
            <div>
              <label className="block text-xs text-white/40 uppercase tracking-wider mb-1.5">Precio (€) *</label>
              <input type="number" step="0.10" min="0" value={form.price} onChange={e=>set('price',e.target.value)} placeholder="0.00"
                className="w-full bg-dark-2 border border-white/15 rounded-xl px-3 py-2.5 text-white text-sm focus:outline-none focus:border-brand/60"/>
            </div>
          </div>

          {/* Unidad + Mín. raciones */}
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="block text-xs text-white/40 uppercase tracking-wider mb-1.5">Unidad</label>
              <select value={form.unit} onChange={e=>set('unit',e.target.value)} className="w-full bg-dark-2 border border-white/15 rounded-xl px-3 py-2.5 text-white text-sm focus:outline-none focus:border-brand/60">
                {UNITS.map(u=><option key={u}>{u}</option>)}
              </select>
            </div>
            <div>
              <label className="block text-xs text-white/40 uppercase tracking-wider mb-1.5">Mín. raciones</label>
              <input type="number" min="1" value={form.minR} onChange={e=>set('minR',e.target.value)} placeholder="Ej: 2"
                className="w-full bg-dark-2 border border-white/15 rounded-xl px-3 py-2.5 text-white text-sm focus:outline-none focus:border-brand/60"/>
            </div>
          </div>

          {/* Descripción */}
          <div>
            <label className="block text-xs text-white/40 uppercase tracking-wider mb-1.5">Descripción</label>
            <textarea value={form.desc} onChange={e=>set('desc',e.target.value)} rows={2} placeholder="Descripción breve"
              className="w-full bg-dark-2 border border-white/15 rounded-xl px-3 py-2.5 text-white text-sm focus:outline-none focus:border-brand/60 resize-none"/>
          </div>

          {/* Alérgenos */}
          <div>
            <label className="block text-xs text-white/40 uppercase tracking-wider mb-2">Alérgenos</label>
            <div className="flex flex-wrap gap-2">
              {ALLERGENS.map(al=>(
                <button key={al} onClick={()=>toggleAl(al)}
                  className={`px-2.5 py-1 rounded-lg text-xs border transition-all ${form.al.includes(al)?'bg-brand/20 border-brand/50 text-brand':'bg-dark-2 border-white/10 text-white/40 hover:border-white/20'}`}>
                  {al}
                </button>
              ))}
            </div>
          </div>

          {/* Flags */}
          <div className="flex gap-6">
            <label className="flex items-center gap-2 cursor-pointer">
              <Toggle checked={form.top} onChange={v=>set('top',v)}/>
              <span className="text-sm text-white/60">Destacado ⭐</span>
            </label>
            <label className="flex items-center gap-2 cursor-pointer">
              <Toggle checked={form.active} onChange={v=>set('active',v)}/>
              <span className="text-sm text-white/60">Activo</span>
            </label>
          </div>

          {/* Fotografía */}
          <div>
            <label className="block text-xs text-white/40 uppercase tracking-wider mb-2">Fotografía del producto</label>
            <div className="space-y-2">
              {/* Preview arrastrable — solo cuando hay imagen */}
              {(form.imgUrl || form.imgData) && (
                <div>
                  <div
                    ref={previewRef}
                    className="w-full rounded-xl border border-white/10 overflow-hidden bg-dark-2 relative select-none"
                    style={{aspectRatio:'8/5', cursor: dragging ? 'grabbing' : 'grab'}}
                    onMouseDown={e=>{ e.preventDefault(); startDrag(e.clientX, e.clientY); }}
                    onTouchStart={e=>{ startDrag(e.touches[0].clientX, e.touches[0].clientY); }}
                    onWheel={e=>{ e.preventDefault(); setForm(f=>({...f, imgZoom:clampZoom(f.imgZoom + (e.deltaY<0?0.1:-0.1))})); }}>
                    <img src={form.imgUrl || form.imgData} alt="preview"
                      className="w-full h-full object-cover pointer-events-none"
                      style={{
                        objectPosition: form.imgPos,
                        transform: `scale(${form.imgZoom||1})`,
                        transformOrigin: form.imgPos
                      }}
                      onError={e=>{e.target.style.display='none'}}/>
                    {/* Hint arrastrar */}
                    {!dragging && (
                      <div className="absolute inset-0 flex items-end justify-center pb-2 pointer-events-none">
                        <span className="text-xs text-white/60 bg-black/40 backdrop-blur-sm px-2 py-0.5 rounded-full">
                          ✥ Arrastra · rueda para zoom
                        </span>
                      </div>
                    )}
                    {/* Botones zoom */}
                    <div className="absolute top-2 right-2 flex items-center gap-1">
                      <button type="button"
                        onMouseDown={e=>e.stopPropagation()}
                        onClick={e=>{ e.stopPropagation(); setForm(f=>({...f,imgZoom:clampZoom(f.imgZoom-0.25)})); }}
                        className="w-6 h-6 rounded bg-black/50 hover:bg-black/70 text-white text-base leading-none flex items-center justify-center transition-colors">−</button>
                      <span className="text-xs text-white/70 bg-black/40 px-1.5 py-0.5 rounded min-w-[36px] text-center">{(form.imgZoom||1).toFixed(1)}×</span>
                      <button type="button"
                        onMouseDown={e=>e.stopPropagation()}
                        onClick={e=>{ e.stopPropagation(); setForm(f=>({...f,imgZoom:clampZoom(f.imgZoom+0.25)})); }}
                        className="w-6 h-6 rounded bg-black/50 hover:bg-black/70 text-white text-base leading-none flex items-center justify-center transition-colors">+</button>
                    </div>
                  </div>
                  <p className="text-xs text-white/25 mt-1 text-right">{form.imgPos} · {(form.imgZoom||1).toFixed(1)}×</p>
                </div>
              )}
              {/* URL / ruta */}
              <div>
                <input
                  type="text"
                  value={form.imgUrl}
                  onChange={e=>set('imgUrl', e.target.value.trim())}
                  placeholder="img/productos/nombre.jpg  ó  https://..."
                  className="w-full bg-dark-2 border border-white/15 rounded-xl px-3 py-2 text-sm text-white placeholder-white/25 focus:outline-none focus:border-brand/50"/>
                <p className="text-xs text-white/30 mt-1">Ruta relativa o URL pública · se usa en la web desplegada</p>
              </div>
              {/* Subir archivo */}
              <input ref={imgRef} type="file" accept="image/jpeg,image/png,image/webp" className="hidden"
                onChange={async e=>{
                  const file = e.target.files?.[0];
                  if (!file) return;
                  e.target.value = '';
                  const reader = new FileReader();
                  reader.onload = async ev => {
                    const dataUrl = ev.target.result;
                    set('imgData', dataUrl);
                    set('imgPos', '50% 50%');
                    set('imgZoom', 1);
                    if (ghReady()) {
                      const slug = file.name.replace(/[^a-z0-9._-]/gi,'-').toLowerCase();
                      const path = `img/productos/${slug}`;
                      try {
                        set('imgUploading', true);
                        await ghPutImage(path, dataUrl, `📷 Imagen producto: ${slug}`);
                        set('imgUrl', path);
                        set('imgData', '');
                        set('imgUploading', false);
                      } catch(err) {
                        set('imgUploading', false);
                        alert(`Error subiendo imagen: ${err.message}`);
                      }
                    }
                  };
                  reader.readAsDataURL(file);
                }}/>
              <div className="flex items-center gap-3">
                <button type="button" onClick={()=>imgRef.current?.click()} disabled={form.imgUploading}
                  className="flex-1 border border-dashed border-white/15 hover:border-white/30 rounded-xl py-2 text-xs text-white/35 hover:text-white/60 transition-colors disabled:opacity-40 disabled:cursor-wait">
                  {form.imgUploading ? '⏳ Subiendo a GitHub…' : (ghReady() ? '📷 Subir imagen → GitHub' : '📁 Cargar archivo (solo local)')}
                </button>
                {(form.imgData || form.imgUrl) && (
                  <button type="button" onClick={()=>{set('imgData',''); set('imgUrl',''); set('imgPos','50% 50%'); set('imgZoom',1);}} className="text-xs text-red-400/50 hover:text-red-400 transition-colors flex-shrink-0">
                    ✕ Quitar
                  </button>
                )}
              </div>
              {form.imgData && !form.imgUrl && !form.imgUploading && (
                <p className="text-xs text-yellow-400/70 leading-snug">⚠ Sin GitHub configurado, la imagen solo se ve en este navegador.</p>
              )}
            </div>
          </div>
        </div>

        <div className="px-6 py-4 border-t border-white/10 flex gap-3 justify-end">
          <button onClick={onClose} className="px-4 py-2 rounded-xl text-sm text-white/50 hover:text-white/80 border border-white/10 hover:border-white/20 transition-colors">Cancelar</button>
          <button onClick={submit} className="px-5 py-2 rounded-xl bg-brand hover:bg-brand-light text-dark font-semibold text-sm transition-colors">
            {isNew?'Crear producto':'Guardar cambios'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════
   TAB: CARTA (gestión de productos)
   ════════════════════════════════════════════════ */
function TabCarta({showToast}) {
  const [products, setProducts] = useState(loadProducts);
  const [search,   setSearch]   = useState('');
  const [catFilter,setCatFilter] = useState('todos');
  const [modal,    setModal]    = useState(null); // null | 'new' | product
  const [confirm,  setConfirm]  = useState(null); // id a eliminar

  useEffect(()=>{ saveProducts(products); },[products]);

  const filtered = useMemo(()=>{
    let l = catFilter==='todos' ? products : products.filter(p=>p.cat===catFilter);
    if (search.trim()) {
      const q = search.toLowerCase();
      l = l.filter(p=>p.name.toLowerCase().includes(q)||CAT_LABELS[p.cat]?.toLowerCase().includes(q));
    }
    return l;
  },[products,catFilter,search]);

  const stats = useMemo(()=>({
    total:     products.length,
    activos:   products.filter(p=>p.active!==false).length,
    inactivos: products.filter(p=>p.active===false).length,
    favoritos: products.filter(p=>p.top===true).length,
  }),[products]);

  const handleSave = (prod) => {
    setProducts(prev=>{
      const idx = prev.findIndex(p=>p.id===prod.id);
      if (idx>=0) { const n=[...prev]; n[idx]=prod; return n; }
      return [...prev, prod];
    });
    showToast(modal==='new'?`"${prod.name}" creado`:`"${prod.name}" actualizado`,'ok');
    setModal(null);
  };

  const handleDelete = (id) => {
    const p = products.find(x=>x.id===id);
    setProducts(prev=>prev.filter(x=>x.id!==id));
    showToast(`"${p?.name}" eliminado`,'info');
    setConfirm(null);
  };

  const exportProductosJson = () => {
    // Excluye imgData (base64 local) — solo exporta imgUrl para que funcione en GitHub Pages
    const data = products.map(({imgData, ...rest}) => rest);
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'productos.json';
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('productos.json descargado — súbelo al repo para sincronizar', 'ok');
  };

  const handleToggle = (id, active) => {
    setProducts(prev=>prev.map(p=>p.id===id?{...p,active}:p));
  };

  const handleTop = (id) => {
    setProducts(prev=>prev.map(p=>p.id===id?{...p,top:!p.top}:p));
  };

  const handlePrice = (id, val) => {
    const price = parseFloat(val);
    if (!isNaN(price) && price>=0) setProducts(prev=>prev.map(p=>p.id===id?{...p,price}:p));
  };

  return (
    <div className="space-y-5">
      {/* Stats */}
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
        {[['Total productos',stats.total,'text-white'],['Activos',stats.activos,'text-green-300'],['Inactivos',stats.inactivos,'text-red-300'],['Favoritos',stats.favoritos,'text-yellow-300']].map(([l,v,c])=>(
          <div key={l} className="bg-dark-3 border border-white/5 rounded-xl p-4">
            <div className="text-xs text-white/40 uppercase tracking-wider mb-1">{l}</div>
            <div className={`text-2xl font-bold ${c}`}>{v}</div>
          </div>
        ))}
      </div>

      {/* Barra de acciones */}
      <div className="flex flex-col sm:flex-row gap-3">
        <div className="relative flex-1">
          <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-white/30" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path strokeLinecap="round" d="m21 21-4.35-4.35"/></svg>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar producto…"
            className="w-full bg-dark-3 border border-white/10 rounded-xl pl-9 pr-8 py-2.5 text-sm text-white placeholder-white/25 focus:outline-none focus:border-brand/50"/>
          {search && <button onClick={()=>setSearch('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60">✕</button>}
        </div>
        <select value={catFilter} onChange={e=>setCatFilter(e.target.value)}
          className="bg-dark-3 border border-white/10 text-white text-sm rounded-xl px-3 py-2.5 focus:outline-none focus:border-brand/50">
          <option value="todos">Todas las categorías</option>
          {CATS.map(c=><option key={c} value={c}>{CAT_LABELS[c]}</option>)}
        </select>
        <button onClick={exportProductosJson}
          className="flex items-center gap-1.5 border border-white/15 hover:border-white/30 text-white/50 hover:text-white/80 text-sm px-3 py-2.5 rounded-xl transition-colors whitespace-nowrap">
          <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          Exportar .json
        </button>
        <button onClick={()=>setModal('new')}
          className="flex items-center gap-2 bg-brand hover:bg-brand-light text-dark font-semibold text-sm px-4 py-2.5 rounded-xl transition-colors whitespace-nowrap">
          <span className="text-lg leading-none">+</span> Nuevo producto
        </button>
      </div>

      {/* Tabla productos */}
      <div className="bg-dark-2 border border-white/5 rounded-2xl overflow-hidden">
        <div className="px-4 py-3 border-b border-white/5">
          <span className="text-xs text-white/40">{filtered.length} producto{filtered.length!==1?'s':''} {catFilter!=='todos'?`· ${CAT_LABELS[catFilter]}`:''}</span>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full min-w-[780px]">
            <thead className="bg-dark-3 border-b border-white/5">
              <tr>
                <th className="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-white/40">Producto</th>
                <th className="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-white/40 hidden sm:table-cell">Categoría</th>
                <th className="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wider text-white/40">Precio</th>
                <th className="px-4 py-3 text-center text-xs font-semibold uppercase tracking-wider text-yellow-400/60">⭐ Fav.</th>
                <th className="px-4 py-3 text-center text-xs font-semibold uppercase tracking-wider text-white/40">Activo</th>
                <th className="px-4 py-3 text-right text-xs font-semibold uppercase tracking-wider text-white/40">Acciones</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-white/5">
              {filtered.length===0
                ? <tr><td colSpan="6" className="px-4 py-12 text-center text-white/30 text-sm">No se encontraron productos</td></tr>
                : filtered.map(p=>(
                  <tr key={p.id} className={`transition-colors hover:bg-white/[0.02] ${p.active===false?'opacity-50':''}`}>
                    <td className="px-4 py-3">
                      <div className="font-medium text-sm text-white flex items-center gap-2">
                        {p.top && <span className="text-xs" title="Destacado">⭐</span>}
                        {p.name}
                      </div>
                      {p.desc && <div className="text-xs text-white/30 mt-0.5 truncate max-w-xs">{p.desc}</div>}
                      {p.al?.length>0 && <div className="text-xs text-amber-500/60 mt-0.5">{p.al.slice(0,3).join(', ')}{p.al.length>3?` +${p.al.length-3}`:''}</div>}
                    </td>
                    <td className="px-4 py-3 hidden sm:table-cell">
                      <span className="text-xs bg-white/8 border border-white/10 px-2 py-1 rounded-lg text-white/60">{CAT_LABELS[p.cat]||p.cat}</span>
                    </td>
                    <td className="px-4 py-3">
                      <div className="flex items-center gap-1">
                        <input
                          type="number" step="0.10" min="0"
                          defaultValue={Number(p.price).toFixed(2)}
                          onBlur={e=>handlePrice(p.id,e.target.value)}
                          onKeyDown={e=>e.key==='Enter'&&e.target.blur()}
                          className="w-20 bg-dark border border-white/15 rounded-lg px-2 py-1 text-white text-sm focus:outline-none focus:border-brand/60 text-right"
                        />
                        <span className="text-xs text-white/30">€/{p.unit||'ud'}</span>
                      </div>
                    </td>
                    <td className="px-4 py-3 text-center">
                      <button
                        onClick={()=>handleTop(p.id)}
                        title={p.top?'Quitar de favoritos':'Marcar como favorito'}
                        className="text-xl leading-none transition-transform hover:scale-125 focus:outline-none"
                      >
                        {p.top ? '⭐' : <span className="text-white/20 hover:text-yellow-300/60">☆</span>}
                      </button>
                    </td>
                    <td className="px-4 py-3 text-center">
                      <div className="flex justify-center">
                        <Toggle checked={p.active!==false} onChange={v=>handleToggle(p.id,v)}/>
                      </div>
                    </td>
                    <td className="px-4 py-3 text-right">
                      <div className="flex items-center gap-2 justify-end">
                        <button onClick={()=>setModal(p)}
                          className="text-xs text-white/40 hover:text-white/80 border border-white/10 hover:border-white/25 px-2.5 py-1.5 rounded-lg transition-colors">
                          Editar
                        </button>
                        <button onClick={()=>setConfirm(p.id)}
                          className="text-xs text-red-400/60 hover:text-red-400 border border-red-400/20 hover:border-red-400/40 px-2.5 py-1.5 rounded-lg transition-colors">
                          Eliminar
                        </button>
                      </div>
                    </td>
                  </tr>
                ))
              }
            </tbody>
          </table>
        </div>
      </div>

      {/* Modal editar/crear */}
      {modal && (
        <ProductModal
          product={modal==='new'?null:modal}
          onSave={handleSave}
          onClose={()=>setModal(null)}
        />
      )}

      {/* Confirm eliminar */}
      {confirm && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-dark/80 backdrop-blur-sm">
          <div className="bg-dark-3 border border-white/10 rounded-2xl p-6 w-full max-w-sm text-center shadow-2xl">
            <div className="text-3xl mb-3">🗑️</div>
            <h3 className="font-bold text-white mb-2">¿Eliminar producto?</h3>
            <p className="text-sm text-white/50 mb-6">Esta acción no se puede deshacer. El producto desaparecerá de la web.</p>
            <div className="flex gap-3">
              <button onClick={()=>setConfirm(null)} className="flex-1 py-2.5 rounded-xl border border-white/15 text-white/60 hover:text-white/80 text-sm transition-colors">Cancelar</button>
              <button onClick={()=>handleDelete(confirm)} className="flex-1 py-2.5 rounded-xl bg-red-500 hover:bg-red-400 text-white font-semibold text-sm transition-colors">Eliminar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════════
   APP PRINCIPAL

function ReviewModal({data, onSave, onClose}) {
  const [form, setForm] = React.useState(data);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  function handleAuthor(val) {
    const parts = val.trim().split(/\s+/);
    const ini = parts.length>=2 ? (parts[0][0]+parts[parts.length-1][0]).toUpperCase() : val.slice(0,2).toUpperCase();
    setForm(f=>({...f,author:val,initials:ini}));
  }
  return (
    <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
      <div className="bg-[#1a1108] border border-white/10 rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
        <div className="flex items-center justify-between p-5 border-b border-white/10">
          <h3 className="text-white font-bold text-lg">{form.id?'Editar reseña':'Nueva reseña'}</h3>
          <button onClick={onClose} className="text-white/40 hover:text-white text-2xl leading-none">×</button>
        </div>
        <div className="p-5 flex flex-col gap-4">
          <div>
            <label className="text-white/50 text-xs font-semibold uppercase tracking-wide block mb-2">Valoración</label>
            <div className="flex gap-2">
              {[1,2,3,4,5].map(n=>(
                <button key={n} onClick={()=>set('stars',n)}
                  className={`text-2xl transition-transform hover:scale-110 ${n<=form.stars?'text-yellow-400':'text-white/20'}`}>★</button>
              ))}
            </div>
          </div>
          <div>
            <label className="text-white/50 text-xs font-semibold uppercase tracking-wide block mb-1">Texto de la reseña</label>
            <textarea value={form.text} onChange={e=>set('text',e.target.value)} rows={4}
              className="w-full bg-white/5 border border-white/15 text-white rounded-lg p-3 text-sm resize-none focus:outline-none focus:border-brand"
              placeholder="Escribe la reseña..."/>
          </div>
          <div>
            <label className="text-white/50 text-xs font-semibold uppercase tracking-wide block mb-1">Nombre del autor</label>
            <input value={form.author} onChange={e=>handleAuthor(e.target.value)}
              className="w-full bg-white/5 border border-white/15 text-white rounded-lg p-3 text-sm focus:outline-none focus:border-brand"
              placeholder="María L."/>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-white/50 text-xs font-semibold uppercase tracking-wide block mb-1">Iniciales</label>
              <input value={form.initials} onChange={e=>set('initials',e.target.value.toUpperCase().slice(0,3))} maxLength={3}
                className="w-full bg-white/5 border border-white/15 text-white rounded-lg p-3 text-sm focus:outline-none focus:border-brand"
                placeholder="ML"/>
            </div>
            <div>
              <label className="text-white/50 text-xs font-semibold uppercase tracking-wide block mb-1">Fecha · Local</label>
              <input value={form.meta} onChange={e=>set('meta',e.target.value)}
                className="w-full bg-white/5 border border-white/15 text-white rounded-lg p-3 text-sm focus:outline-none focus:border-brand"
                placeholder="Marzo 2026 · Ávila"/>
            </div>
          </div>
        </div>
        <div className="flex gap-3 p-5 border-t border-white/10">
          <button onClick={onClose} className="flex-1 border border-white/15 text-white/60 rounded-lg py-2.5 text-sm hover:border-white/30 transition-colors">Cancelar</button>
          <button onClick={()=>{ if(form.text.trim()&&form.author.trim()) onSave(form); }}
            className="flex-1 bg-brand text-white rounded-lg py-2.5 text-sm font-semibold hover:opacity-80 transition-opacity">
            {form.id?'Guardar cambios':'Añadir reseña'}
          </button>
        </div>
      </div>
    </div>
  );
}

function TabReseñas({showToast}) {
  const BLANK = {stars:5,text:'',author:'',initials:'',meta:''};
  const [reviews, setReviews] = React.useState(()=>
    JSON.parse(localStorage.getItem(REVIEWS_KEY)||'null') || DEFAULT_REVIEWS
  );
  const [modal, setModal] = React.useState(null);

  function save(list) {
    localStorage.setItem(REVIEWS_KEY, JSON.stringify(list));
    setReviews(list);
  }
  function handleDelete(id) { save(reviews.filter(r=>r.id!==id)); showToast('Reseña eliminada'); }
  function handleSave(data) {
    const list = data.id ? reviews.map(r=>r.id===data.id?data:r) : [...reviews,{...data,id:Date.now()}];
    save(list);
    showToast(data.id?'Reseña actualizada':'Reseña añadida');
    setModal(null);
  }

  return (
    <div>
      <div className="flex items-center justify-between mb-6">
        <div>
          <h2 className="text-white font-bold text-xl">Reseñas</h2>
          <p className="text-white/40 text-sm mt-1">{reviews.length} reseña{reviews.length!==1?'s':''} publicada{reviews.length!==1?'s':''}</p>
        </div>
        <button onClick={()=>setModal({data:{...BLANK}})}
          className="bg-brand text-white px-4 py-2 rounded-lg text-sm font-semibold hover:opacity-80 transition-opacity">
          + Nueva reseña
        </button>
      </div>
      <div className="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
        {reviews.map(r=>(
          <div key={r.id} className="bg-white/5 border border-white/10 rounded-xl p-4 flex flex-col">
            <div className="text-yellow-400 text-base mb-2">{'★'.repeat(r.stars)}{'☆'.repeat(5-r.stars)}</div>
            <p className="text-white/65 text-sm italic mb-3 flex-1">"{r.text}"</p>
            <div className="flex items-center gap-2 mb-3">
              <div className="w-8 h-8 rounded-full bg-brand flex items-center justify-center text-white text-xs font-bold flex-shrink-0">{r.initials}</div>
              <div>
                <div className="text-white text-sm font-semibold">{r.author}</div>
                <div className="text-white/40 text-xs">{r.meta}</div>
              </div>
            </div>
            <div className="flex gap-2 border-t border-white/10 pt-3">
              <button onClick={()=>setModal({data:{...r}})}
                className="flex-1 text-xs text-white/50 hover:text-white border border-white/10 hover:border-white/30 rounded-lg py-1.5 transition-colors">✏️ Editar</button>
              <button onClick={()=>handleDelete(r.id)}
                className="flex-1 text-xs text-red-400/70 hover:text-red-400 border border-white/10 hover:border-red-400/30 rounded-lg py-1.5 transition-colors">🗑 Eliminar</button>
            </div>
          </div>
        ))}
      </div>
      {modal && <ReviewModal data={modal.data} onSave={handleSave} onClose={()=>setModal(null)}/>}
    </div>
  );
}

/* ════════════════════════════════════════════════

function TabAjustes({showToast}) {
  const saved = ghCfg();
  const [cfg, setCfg] = useState({token: saved.token||'', owner: saved.owner||'', repo: saved.repo||'', branch: saved.branch||'main'});
  const [testing, setTesting] = useState(false);
  const [status,  setStatus]  = useState(null); // null | 'ok' | 'err'

  const set = (k,v) => setCfg(c=>({...c,[k]:v}));

  const save = () => {
    localStorage.setItem(GH_KEY, JSON.stringify(cfg));
    showToast('Configuración guardada', 'ok');
  };

  const test = async () => {
    if (!cfg.token || !cfg.owner || !cfg.repo) { showToast('Rellena todos los campos primero', 'err'); return; }
    setTesting(true); setStatus(null);
    localStorage.setItem(GH_KEY, JSON.stringify(cfg));
    try {
      const res = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}`, {
        headers: { Authorization: `Bearer ${cfg.token}`, Accept: 'application/vnd.github+json' }
      });
      if (res.ok) { setStatus('ok'); showToast('✅ Conexión correcta con GitHub', 'ok'); }
      else        { setStatus('err'); showToast(`Error ${res.status}: revisa el token y el repo`, 'err'); }

    setTesting(false);
  };

    <div className="max-w-xl space-y-6">

      {/* Info */}

          Crear token en GitHub (abre en nueva pestaña)
        </a>
      </div>

      {/* Formulario */}
      <div className="bg-dark-3 border border-white/8 rounded-2xl p-5 space-y-4">
        <div>
          <label className="block text-xs text-white/40 uppercase tracking-wider mb-1.5">Personal Access Token</label>
          <input type="password" value={cfg.token} onChange={e=>set('token',e.target.value)}
            placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
            className="w-full bg-dark-2 border border-white/15 rounded-xl px-3 py-2.5 text-sm text-white font-mono placeholder-white/20 focus:outline-none focus:border-brand/50"/>
          <p className="text-xs text-white/30 mt-1">Necesita permisos de <span className="font-mono">repo</span> (lectura y escritura)</p>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="block text-xs text-white/40 uppercase tracking-wider mb-1.5">Usuario / Organización</label>
            <input type="text" value={cfg.owner} onChange={e=>set('owner',e.target.value)}
              placeholder="cesarchicoalonso-dot"
              className="w-full bg-dark-2 border border-white/15 rounded-xl px-3 py-2.5 text-sm text-white placeholder-white/20 focus:outline-none focus:border-brand/50"/>
          </div>
          <div>
            <label className="block text-xs text-white/40 uppercase tracking-wider mb-1.5">Repositorio</label>
            <input type="text" value={cfg.repo} onChange={e=>set('repo',e.target.value)}
              placeholder="arrozencaja"
              className="w-full bg-dark-2 border border-white/15 rounded-xl px-3 py-2.5 text-sm text-white placeholder-white/20 focus:outline-none focus:border-brand/50"/>
          </div>
        </div>
        <div>
          <label className="block text-xs text-white/40 uppercase tracking-wider mb-1.5">Rama (branch)</label>
          <input type="text" value={cfg.branch} onChange={e=>set('branch',e.target.value)}
            placeholder="main"
            className="w-full bg-dark-2 border border-white/15 rounded-xl px-3 py-2.5 text-sm text-white placeholder-white/20 focus:outline-none focus:border-brand/50"/>
        </div>
        <div className="flex gap-3 pt-1">
          <button onClick={test} disabled={testing}
            className="flex items-center gap-2 px-4 py-2.5 rounded-xl border border-white/15 hover:border-white/30 text-sm text-white/60 hover:text-white/80 transition-colors disabled:opacity-40">
            {testing ? '⏳ Probando…' : (status==='ok' ? '✅ Conexión OK' : status==='err' ? '❌ Reintentar' : '🔌 Probar conexión')}
          </button>
          <button onClick={save}
            className="flex-1 py-2.5 rounded-xl bg-brand hover:bg-brand-light text-dark font-semibold text-sm transition-colors">
            Guardar configuración
          </button>
        </div>
      </div>

      {/* Estado actual */}
      <div className={`flex items-center gap-3 px-4 py-3 rounded-xl border text-sm ${ghReady() ? 'border-green-500/30 bg-green-500/8 text-green-300' : 'border-white/10 bg-dark-3 text-white/40'}`}>
        <span className="text-base">{ghReady() ? '🟢' : '⚪'}</span>
        {ghReady()
          ? <span>Publicación configurada — repo <span className="font-mono text-green-200">{ghCfg().owner}/{ghCfg().repo}</span> · rama <span className="font-mono text-green-200">{ghCfg().branch||'main'}</span></span>
          : 'Sin configurar — los cambios solo se guardan en este navegador'}
      </div>

    </div>
  );
}

function App() {
  const [authed,     setAuthed]     = useState(()=> localStorage.getItem(AUTH_KEY)==='1');
  const [tab,        setTab]        = useState('pedidos');
  const [toast,      setToast]      = useState(null);
  const [publishing, setPublishing] = useState(false);

  const showToast = useCallback((msg, type='ok')=>{
    setToast({msg,type});
    setTimeout(()=>setToast(null),2800);
  },[]);

  const logout = () => {
    localStorage.removeItem(AUTH_KEY);
    window.location.href = 'index.html';
  };

  const publish = async () => {
    if (!ghReady()) { setTab('ajustes'); showToast('Configura GitHub primero', 'err'); return; }
    setPublishing(true);
    try {
      const products = loadProducts().map(({imgData, ...rest}) => rest);
      await ghPutText('productos.json', JSON.stringify(products, null, 2), '🍽️ Update productos.json via admin');
      showToast('✅ Publicado — cambios visibles en ~1 min', 'ok');
    } catch(e) {
      showToast(`Error al publicar: ${e.message}`, 'err');
    }
    setPublishing(false);
  };

  if (!authed) return <LoginScreen onAuth={()=>setAuthed(true)}/>;

  const TABS = [
    {id:'pedidos',  label:'📋 Pedidos'},
    {id:'carta',    label:'🍽️ Carta'},
    {id:'reseñas',  label:'⭐ Reseñas'},
    {id:'ajustes',  label:'⚙️ Ajustes'},
  ];

  return (
    <div className="min-h-screen bg-dark text-white">
      {/* Topbar */}
      <header className="sticky top-0 z-40 bg-dark/95 backdrop-blur border-b border-white/5 px-4 sm:px-6 py-3 flex items-center justify-between gap-3">
        <div className="flex items-center gap-3">
          <a href="index.html" className="hover:opacity-80 transition-opacity flex items-center">
            <img src="img/logotipo.png" alt="Arroz en Caja" className="h-9 w-9 object-contain"
              onError={e=>{e.target.style.display='none';e.target.nextElementSibling.style.display='block'}}/>
            <span className="font-bold text-lg tracking-tight hidden">arroz<span className="text-brand">·en·</span>caja</span>
          </a>
          <span className="hidden sm:block text-white/20">|</span>
          <span className="hidden sm:block text-sm text-white/50">Administración</span>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={publish} disabled={publishing}
            title={ghReady() ? 'Publicar cambios en GitHub Pages' : 'Configura GitHub en Ajustes'}
            className={`flex items-center gap-1.5 text-xs font-semibold px-3 py-1.5 rounded-lg transition-all disabled:opacity-50 ${ghReady() ? 'bg-brand hover:bg-brand-light text-dark' : 'border border-white/15 text-white/30 hover:text-white/50'}`}>
            {publishing
              ? <><svg className="w-3.5 h-3.5 animate-spin" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> Publicando…</>
              : <><svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg> Publicar</>}
          </button>
          <button onClick={logout} className="text-xs text-white/30 hover:text-white/60 border border-white/10 hover:border-white/25 px-3 py-1.5 rounded-lg transition-colors">
            ← Salir
          </button>
        </div>
      </header>

      {/* Tabs */}
      <div className="border-b border-white/5 px-4 sm:px-6">
        <div className="flex gap-1 max-w-7xl mx-auto">
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              className={`px-4 py-3 text-sm font-medium transition-all border-b-2 -mb-px ${tab===t.id?'border-brand text-white':'border-transparent text-white/40 hover:text-white/70'}`}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {/* Contenido */}
      <main className="max-w-7xl mx-auto px-4 sm:px-6 py-6">
        {tab==='pedidos'  && <TabPedidos  showToast={showToast}/>}
        {tab==='carta'    && <TabCarta    showToast={showToast}/>}
        {tab==='reseñas'  && <TabReseñas  showToast={showToast}/>}
        {tab==='ajustes'  && <TabAjustes  showToast={showToast}/>}
      </main>

      <Toast toast={toast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
